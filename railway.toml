[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate --schema=backend/prisma/schema.prisma"

[deploy]
startCommand = "npm run start:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/health"
initialDelaySeconds = 10
timeoutSeconds = 5
